name: Cross Review Dispatch

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled]

jobs:
  dispatch:
    if: >
      !github.event.pull_request.draft &&
      (
        contains(github.event.pull_request.head.ref, 'codex') ||
        contains(github.event.pull_request.head.ref, 'claude') ||
        contains(github.event.pull_request.labels.*.name, 'agent-codex') ||
        contains(github.event.pull_request.labels.*.name, 'agent-claude')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Skip rework commits
        id: gate
        env:
          GH_TOKEN: ${{ secrets.ORCHESTRATOR_PAT || secrets.GITHUB_TOKEN }}
        run: |
          MSG="$(curl -fsSL \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/commits/${{ github.event.pull_request.head.sha }}" \
            | jq -r '.commit.message // ""')"
          if echo "$MSG" | grep -qi '\[skip-review\]'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Dispatch cross-review to orchestrator
        if: steps.gate.outputs.skip != 'true'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.ORCHESTRATOR_PAT }}
          repository: {{GITHUB_OWNER}}/{{ORCHESTRATOR_REPO}}
          event-type: cross-review
          client-payload: |
            {
              "repo": "${{ github.repository }}",
              "pr": "${{ github.event.pull_request.number }}",
              "title": "${{ github.event.pull_request.title }}",
              "branch": "${{ github.event.pull_request.head.ref }}"
            }
