name: Solo CTO Pipeline
on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Route to orchestrator
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ORCHESTRATOR_PAT }}
          script: |
            // ANTI-LOOP GUARDS (7 layers):
            // 1. Skip bot actors
            // 2. Skip [skip-review] / [rework-round] / [bot-tag] markers
            // 3. Skip review-engine markers (<!-- review-engine / cross-review / visual-review -->)
            // 4. Skip [consensus-report] marker
            // 5. Check commit message for [skip-review]
            // 6. Require rework signals for issue_comment dispatch
            // 7. Self-dispatch prevention (orchestrator actor)

            const event = context.eventName;
            const action = context.payload.action;
            const actor = context.payload.sender?.login || '';

            // Layer 1: Bot guard
            if (
              actor.includes('[bot]') ||
              actor === 'github-actions[bot]' ||
              actor === 'solo-cto-agent' ||
              actor === 'dependabot[bot]'
            ) {
              console.log(`ℹ️ [L1] Skipping bot actor: ${actor}`);
              return;
            }

            // Get comment/review body
            const body = (
              context.payload.comment?.body ||
              context.payload.review?.body ||
              ''
            );
            const bodyLower = body.toLowerCase();

            // Layer 2: Skip-marker guard
            if (
              bodyLower.includes('[skip-review]') ||
              bodyLower.includes('[rework-round]') ||
              bodyLower.includes('[bot-tag]')
            ) {
              console.log(`ℹ️ [L2] Skipping message with skip markers`);
              return;
            }

            // Layer 3: Review Engine comment guard (THE KEY FIX)
            // Review Engine comments contain HTML markers like:
            // <!-- review-engine-lock --> <!-- cross-review --> <!-- visual-review -->
            // Keep this list in sync with every agent script that posts PR
            // comments — any unlisted format triggers L6 and causes loops.
            if (
              body.includes('<!-- review-engine') ||
              body.includes('<!-- cross-reviewer:') ||
              body.includes('## 🔍 Cross-Review') ||
              body.includes('## 🔍 Consensus Review') ||
              body.includes('## 🎨 Visual UI/UX Review') ||
              body.includes('## Visual Report — Before / After') ||
              body.includes('[visual-report-skipped:') ||
              body.includes('## 📊 Visual + Performance') ||
              body.includes('## 📋 Consensus Report') ||
              body.includes('Review engine lock acquired') ||
              body.includes('Rework Stopped (Circuit Breaker)') ||
              body.includes('Auto-merge enabled.')
            ) {
              console.log(`ℹ️ [L3] Skipping Review Engine comment`);
              return;
            }

            // Layer 4: Consensus report guard
            if (bodyLower.includes('[consensus-report]')) {
              console.log(`ℹ️ [L4] Skipping consensus report`);
              return;
            }

            // Route based on event type
            let eventType = '';
            let prNumber = null;
            let branch = '';

            if (event === 'pull_request') {
              // Layer 5: Check commit message for [skip-review]
              const sha = context.payload.pull_request?.head?.sha;
              try {
                const commit = await github.rest.repos.getCommit({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: sha
                });
                if ((commit.data.commit.message || '').includes('[skip-review]')) {
                  console.log(`ℹ️ [L5] Skipping PR with [skip-review] commit`);
                  return;
                }
              } catch (e) {
                console.log(`⚠️ Could not fetch commit: ${e.message}`);
              }

              eventType = 'review-request';
              prNumber = context.payload.pull_request.number;
              branch = context.payload.pull_request.head.ref;
              console.log(`📋 PR ${prNumber} opened/updated on branch ${branch}`);

            } else if (event === 'pull_request_review' && action === 'submitted') {
              if (context.payload.review?.state === 'changes_requested') {
                eventType = 'rework-request';
                prNumber = context.payload.pull_request?.number;
                branch = context.payload.pull_request?.head?.ref;
                console.log(`🔧 Review requesting changes on PR ${prNumber}`);
              } else {
                console.log(`ℹ️ Review approved/commented, no action needed`);
                return;
              }

            } else if (
              event === 'issue_comment' &&
              context.payload.issue?.pull_request
            ) {
              // Layer 6: Require rework signals for comment dispatch
              const hasReworkSignals = /blocker|needs.?work|request.?changes|rework|please.?fix/i.test(bodyLower);
              if (!hasReworkSignals) {
                console.log(`ℹ️ [L6] Comment has no rework signals`);
                return;
              }

              eventType = 'rework-request';
              prNumber = context.payload.issue.number;

              try {
                const pr = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber
                });
                branch = pr.data.head.ref;
                console.log(`🔧 Comment with rework signal on PR ${prNumber}`);
              } catch (e) {
                console.error(`❌ Could not fetch PR: ${e.message}`);
                return;
              }
            }

            // Dispatch to orchestrator
            if (!eventType || !prNumber) {
              console.log(`⚠️ Could not determine event type or PR number, skipping`);
              return;
            }

            try {
              await github.rest.repos.createDispatchEvent({
                owner: '{{GITHUB_OWNER}}',
                repo: '{{ORCHESTRATOR_REPO}}',
                event_type: eventType,
                client_payload: {
                  repo: `${context.repo.owner}/${context.repo.repo}`,
                  pr: prNumber,
                  branch: branch,
                  title: context.payload.pull_request?.title || context.payload.issue?.title || '',
                  event: event,
                  action: action || 'triggered'
                }
              });
              console.log(`✅ Dispatched: ${eventType} for PR ${prNumber}`);
            } catch (err) {
              console.error(`❌ Dispatch failed: ${err.message}`);
            }
