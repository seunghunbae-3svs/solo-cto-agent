name: Comparison Dispatch

on:
  issue_comment:
    types: [created]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch baseline / comparison report
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ORCHESTRATOR_PAT }}
          script: |
            if (!context.payload.issue?.pull_request) return;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: prNumber,
              per_page: 100
            });

            const extractUrls = (text) => (String(text || '').match(/https?:\/\/\S+/g) || []);
            const isPreviewUrl = (url) => {
              const lower = String(url || '').toLowerCase();
              return lower.includes('vercel.app') || lower.includes('preview');
            };

            const hasHold = comments.some(c => /\[compare-hold\]/i.test(c.body || ''));
            const cross = comments.filter(c => /cross-reviewer:/i.test(c.body || ''));
            if (cross.length === 0) return;

            const hasCompareReport = comments.some(c => /\[compare-report\]/i.test(c.body || ''));
            const action = cross.length >= 2 ? 'comparison-ready' : 'comparison-baseline';
            if (action === 'comparison-ready' && hasCompareReport) return;

            const pr = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
            const previewUrls = [
              ...extractUrls(pr.data.body || ''),
              ...comments.flatMap(c => extractUrls(c.body || ''))
            ].filter(isPreviewUrl);
            if (hasHold && previewUrls.length === 0) return;

            await github.rest.repos.createDispatchEvent({
              owner: 'seunghunbae-3svs',
              repo: 'dual-agent-review-orchestrator',
              event_type: action,
              client_payload: {
                repo: `${owner}/${repo}`,
                pr: prNumber,
                title: pr.data.title,
                url: pr.data.html_url
              }
            });
