name: Claude Auto

on:
  issues:
    types: [labeled]

permissions:
  issues: write
  contents: read

jobs:
  claude-task:
    runs-on: ubuntu-latest
    if: github.event.label.name == 'agent-claude'
    steps:
      - uses: actions/checkout@v4

      - name: Notify orchestrator
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.ORCHESTRATOR_PAT }}
          repository: seunghunbae-3svs/dual-agent-review-orchestrator
          event-type: route-issue
          client-payload: |
            {
              "issue": "${{ github.event.issue.number }}",
              "labels": "${{ join(github.event.issue.labels.*.name, ',') }}",
              "repo": "${{ github.repository }}",
              "agent": "claude",
              "action": "task-assigned"
            }

      - name: Post assignment comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '🧠 **Claude** assigned to this issue.\n\nOrchestrator notified. Claude will create a branch and submit a PR.',
            });

      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          REPO="${{ github.repository }}"
          ISSUE="${{ github.event.issue.number }}"
          TITLE="${{ github.event.issue.title }}"
          URL="${{ github.event.issue.html_url }}"

          MSG="[${REPO}] agent-claude assigned
          Issue: #${ISSUE} — ${TITLE}
          ${URL}"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="${MSG}" || true
