name: Preview Summary

on:
  deployment_status:
  check_suite:
    types: [completed]

jobs:
  summarize:
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'deployment_status' && github.event.deployment_status.state == 'success') ||
      (github.event_name == 'check_suite' && github.event.check_suite.conclusion == 'success')
    steps:
      - name: Find preview URL
        id: preview
        run: |
          # Prefer environment_url (actual preview), fallback to target_url
          URL="${{ github.event.deployment_status.environment_url || '' }}"
          if [ -z "$URL" ]; then
            URL="${{ github.event.deployment_status.target_url || '' }}"
          fi

          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "has_url=$([ -n '$URL' ] && echo 'true' || echo 'false')" >> "$GITHUB_OUTPUT"

      - name: Find associated PR
        if: steps.preview.outputs.has_url == 'true'
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.deployment?.sha || context.payload.check_suite?.head_sha;
            if (!sha) return;
            const pulls = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: sha,
            });
            const open = pulls.data.find(p => p.state === 'open');
            if (open) {
              core.setOutput('number', open.number);
              core.setOutput('found', 'true');
            } else {
              core.setOutput('found', 'false');
            }

      - name: Post preview comment on PR
        if: steps.pr.outputs.found == 'true' && steps.preview.outputs.has_url == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = parseInt('${{ steps.pr.outputs.number }}');
            const previewUrl = '${{ steps.preview.outputs.url }}';
            const body = [
              '🔗 **Preview Ready**',
              '',
              `URL: ${previewUrl}`,
              '',
              '_Auto-detected by preview-summary workflow_',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });

      - name: Notify Telegram
        if: steps.pr.outputs.found == 'true' && steps.preview.outputs.has_url == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MSG="🔗 Preview ready
          Repo: ${{ github.repository }}
          PR: #${{ steps.pr.outputs.number }}
          URL: ${{ steps.preview.outputs.url }}"

          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
            -d chat_id="$TELEGRAM_CHAT_ID" \
            -d text="$MSG" || true
      - name: Cache Playwright
        if: steps.pr.outputs.found == 'true' && steps.preview.outputs.has_url == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ms-playwright
            ~/.npm
          key: ${{ runner.os }}-playwright-1.43.1

      - name: Send preview screenshot
        if: steps.pr.outputs.found == 'true' && steps.preview.outputs.has_url == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          URL="${{ steps.preview.outputs.url }}"
          if [[ "$URL" != http* ]]; then exit 0; fi
          if [[ "$URL" != *"vercel.app"* && "$URL" != *"preview"* ]]; then exit 0; fi
          sleep 15
          CACHE_BUST="${{ github.run_id }}"
          if [[ "$URL" == *"?"* ]]; then
            URL="${URL}&t=$CACHE_BUST"
          else
            URL="${URL}?t=$CACHE_BUST"
          fi
          npm install playwright@1.43.1 --no-save
          npx playwright install chromium --with-deps

          node - <<'NODE'
          const { chromium } = require('playwright');
          const fs = require('fs');

          (async () => {
            const url = process.env.URL;
            const browser = await chromium.launch({ args: ['--no-sandbox'] });
            const page = await browser.newPage({ viewport: { width: 1280, height: 720 } });
            await page.goto(url, { waitUntil: 'networkidle', timeout: 60000 });
            await page.waitForTimeout(3000);
            await page.screenshot({ path: '/tmp/preview.png', fullPage: true });
            await browser.close();
          })().catch((err) => {
            console.error(err);
            process.exit(1);
          });
NODE

          CAPTION="Preview screenshot: ${{ github.repository }} PR #${{ steps.pr.outputs.number }}\n${{ steps.preview.outputs.url }}"
          if [ -f /tmp/preview.png ]; then
            curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendPhoto" \
              -F chat_id="$TELEGRAM_CHAT_ID" \
              -F photo=@/tmp/preview.png \
              -F caption="$CAPTION" || true
          else
            ENCODED=$(python - <<'PY'
import urllib.parse, os
print(urllib.parse.quote(os.environ.get("URL",""), safe=""))
PY
)
            SHOT="https://image.thum.io/get/width/1200/${ENCODED}"
            curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendPhoto" \
              -d chat_id="$TELEGRAM_CHAT_ID" \
              -d photo="$SHOT" \
              -d caption="$CAPTION" || true
          fi
