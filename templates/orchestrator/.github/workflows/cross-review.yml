name: Auto Cross-Review

on:
  pull_request:
    types: [opened, reopened]

jobs:
  cross-review:
    if: contains(github.event.pull_request.labels.*.name, 'agent-codex') || contains(github.event.pull_request.labels.*.name, 'agent-claude')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cross Review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.ORCHESTRATOR_PAT || secrets.GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: node ops/agents/cross-reviewer.js