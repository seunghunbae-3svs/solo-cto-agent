name: Auto Rework on Review
on:
  pull_request:
    types: [labeled]
  repository_dispatch:
    types: [rework-request]

# Serialize rework per (repo, PR) so rapid successive review signals don't
# spawn parallel rework-agent runs that race on the same PR branch.
concurrency:
  group: rework-${{ github.event.client_payload.repo || github.repository }}-${{ github.event.client_payload.pr || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  rework:
    if: github.event_name == 'repository_dispatch' || github.event.label.name == 'rework'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install @octokit/rest @anthropic-ai/sdk openai
      - name: Run rework agent
        id: rework
        env:
          GH_PAT: ${{ secrets.ORCHESTRATOR_PAT || secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.client_payload.pr }}
          PR_REPO: ${{ github.event.pull_request.head.repo.full_name || github.event.client_payload.repo }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref || github.event.client_payload.branch }}
          # rework-agent writes visual-report-payload.json here if it
          # successfully pushed a commit. The file is then uploaded as
          # an artifact for visual-report.yml to consume.
          VISUAL_REPORT_PAYLOAD_PATH: ${{ github.workspace }}/visual-report-payload.json
        run: node ops/agents/rework-agent.js

      # Uploaded even if rework failed — the visual-report workflow
      # gates on workflow_run conclusion == "success" anyway, so no-op
      # on failure branches. continue-on-error keeps rework succeeding
      # when there's simply nothing to upload.
      - name: Upload visual-report payload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-report-payload
          path: ${{ github.workspace }}/visual-report-payload.json
          if-no-files-found: ignore
          retention-days: 7
