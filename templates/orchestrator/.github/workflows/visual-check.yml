name: Visual UI Check

on:
  # Scheduled baseline comparison
  schedule:
    - cron: "30 */6 * * *"
  # Preview-deployment-driven (Vercel / Netlify deployment_status events
  # on product repos can be mirrored via webhook → repository_dispatch).
  repository_dispatch:
    types: [preview-deployed, visual-check]
  # After rework pushes a fix commit, re-shoot the deployed preview so
  # the Telegram/Discord channel gets fresh screenshots of the change.
  workflow_run:
    workflows: ["Auto Rework on Review"]
    types: [completed]
  workflow_dispatch:
    inputs:
      mode:
        description: "check | baseline | pr"
        required: false
        default: "check"
      deploy_url:
        description: "Preview URL to check (pr mode)"
        required: false
      pr_number:
        description: "PR number to comment on"
        required: false
      product_repo:
        description: "Product repo name"
        required: false

concurrency:
  group: visual-check-${{ github.event.client_payload.pr_number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: write
  issues: write

jobs:
  visual-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: ops
        run: npm ci --ignore-scripts 2>/dev/null || npm install --ignore-scripts 2>/dev/null || true

      - name: Install Playwright
        run: npx playwright install chromium --with-deps 2>/dev/null || echo "Playwright not available, using fallback"

      - name: Run visual check
        env:
          ORCHESTRATOR_PAT: ${{ secrets.ORCHESTRATOR_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          VISUAL_MODE: ${{ github.event.inputs.mode || github.event.client_payload.mode || 'check' }}
          # Notify (Telegram + optional Discord) on every non-scheduled run
          # so the user sees fresh screenshots after a rework or deploy.
          # Scheduled baseline runs stay silent to avoid spam.
          VISUAL_NOTIFY: ${{ github.event_name == 'schedule' && 'false' || 'true' }}
          VISUAL_AUTO_BASELINE: "true"
          # PR-triggered context
          PR_NUMBER: ${{ github.event.inputs.pr_number || github.event.client_payload.pr_number || '' }}
          DEPLOY_URL: ${{ github.event.inputs.deploy_url || github.event.client_payload.deploy_url || '' }}
          PRODUCT_REPO: ${{ github.event.inputs.product_repo || github.event.client_payload.product_repo || '' }}
        run: node ops/scripts/visual-check.js

      - name: Commit baseline updates
        if: ${{ !env.PR_NUMBER }}
        run: |
          git config user.name "orchestrator-bot"
          git config user.email "orchestrator-bot@users.noreply.github.com"
          git add ops/orchestrator/visual-baselines.json ops/orchestrator/visual-baselines || true
          if git diff --cached --quiet; then
            echo "No baseline updates."
            exit 0
          fi
          git commit -m "chore: update visual baselines"
          git push
