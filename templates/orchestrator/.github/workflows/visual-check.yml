name: Visual UI Check

on:
  schedule:
    - cron: "30 */6 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "check | baseline"
        required: false
        default: "check"

concurrency:
  group: visual-check
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  visual-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run visual check
        env:
          ORCHESTRATOR_PAT: ${{ secrets.ORCHESTRATOR_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          VISUAL_MODE: ${{ github.event.inputs.mode || 'check' }}
          VISUAL_NOTIFY: "false"
          VISUAL_AUTO_BASELINE: "true"
          VISUAL_WIDTH: "800"
        run: node ops/scripts/visual-check.js

      - name: Commit baseline updates
        run: |
          git config user.name "orchestrator-bot"
          git config user.email "orchestrator-bot@users.noreply.github.com"
          git add ops/orchestrator/visual-baselines.json ops/orchestrator/visual-baselines || true
          if git diff --cached --quiet; then
            echo "No baseline updates."
            exit 0
          fi
          git commit -m "chore: update visual baselines"
          git push
