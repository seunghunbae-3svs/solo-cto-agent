name: Cross Review Dispatch

on:
  repository_dispatch:
    types: [cross-review]

# One review per (repo, PR) at a time. In-progress runs get cancelled when
# a newer event lands — avoids double-comment if a PR is opened and labeled
# in quick succession, and costs nothing when nothing is racing.
concurrency:
  group: cross-review-${{ github.event.client_payload.repo }}-${{ github.event.client_payload.pr }}
  cancel-in-progress: true

jobs:
  cross-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install @anthropic-ai/sdk openai node-fetch

      - name: Cross Review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.ORCHESTRATOR_PAT || secrets.GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PR_NUMBER: ${{ github.event.client_payload.pr }}
          PR_REPO: ${{ github.event.client_payload.repo }}
          PR_TITLE: ${{ github.event.client_payload.title }}
        run: node ops/agents/cross-reviewer.js
