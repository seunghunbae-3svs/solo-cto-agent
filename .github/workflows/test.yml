name: test

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  # Opt into Node.js 24 runtime for JS actions before it becomes default (2026-06).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        run: npm install
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
