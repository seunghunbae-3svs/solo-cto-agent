name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.1.0)"
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "value=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        # Repo does not commit package-lock.json, so npm install (not ci).
        run: npm install --no-audit --no-fund

      - name: Verify version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${{ steps.tag.outputs.value }}"
          TAG_VERSION_STRIPPED="${TAG_VERSION#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION_STRIPPED" ]; then
            echo "::error::package.json version ($PKG_VERSION) != tag ($TAG_VERSION_STRIPPED)"
            exit 1
          fi

      - name: Run tests
        run: npm test

      - name: Publish to npm
        # Skip gracefully if this version is already on the registry
        # (e.g. manual publish happened before the workflow re-runs).
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view "${PKG_NAME}@${PKG_VERSION}" version >/dev/null 2>&1; then
            echo "${PKG_NAME}@${PKG_VERSION} already published — skipping."
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish VS Code Extension
        working-directory: vscode-extension
        run: |
          npm install -g @vscode/vsce
          # Sync version from root package.json
          ROOT_VERSION=$(node -p "require('../package.json').version")
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
            pkg.version = '${ROOT_VERSION}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          # Copy LICENSE if missing
          [ -f LICENSE ] || cp ../LICENSE .
          # Package and publish
          vsce package --no-dependencies
          vsce publish --no-dependencies
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: ${{ steps.tag.outputs.value }}
          generate_release_notes: true
          files: vscode-extension/*.vsix
