name: Package Validate

on:
  push:
  pull_request:

env:
  # Opt into Node.js 24 runtime for JS actions before it becomes default (2026-06).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate package
        run: node scripts/validate-package.js

      - name: Validate setup.sh install
        run: |
          chmod +x setup.sh
          export CLAUDE_DIR="$RUNNER_TEMP/claude"
          bash setup.sh --install --org ci --tier builder --repos demo-app
