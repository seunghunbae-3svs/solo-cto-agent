name: Changelog Update

on:
  push:
    branches: [main]
    paths-ignore:
      - 'CHANGELOG.md'
      - 'benchmarks/**'

permissions:
  contents: write

env:
  # Opt into Node.js 24 runtime for JS actions before it becomes default (2026-06).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    # Skip if commit message is from this workflow or if head_commit is missing
    if: >-
      github.event.head_commit != null &&
      !startsWith(github.event.head_commit.message, 'chore: update changelog') &&
      !startsWith(github.event.head_commit.message, 'chore(changelog)')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.REPO_PAT || github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update changelog
        run: node scripts/update-changelog.js

      - name: Commit changelog
        run: |
          git config user.name "changelog-bot"
          git config user.email "changelog-bot@users.noreply.github.com"
          git add CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No changelog changes"
            exit 0
          fi
          git commit -m "chore: update changelog [skip ci]"
          git push
